            # Show workflow artifacts info
            echo ""
            echo "📁 Workflow Artifacts:"
            echo "- Performance results: dmd-performance-results-${{ github.sha }}"
            echo "- DMD binaries: dmd-binaries-${{ github.sha }}"
            echo "- Report: /tmp/performance-report.md"
            
        else
            echo "❌ Performance comparison could not be completed"
            echo "Missing result files:"
            ls -la /tmp/perf-results/ || echo "No results directory"
        fi
        
        # Final status
        echo ""
        echo "🏁 DMD Performance Regression Testing completed"
        echo "Check the PR comment for detailed performance comparison results"

  # Optional: Add a job to run performance tests on schedule
  scheduled-performance-test:
    name: Scheduled Performance Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.baseline_ref == '')
    timeout-minutes: 60
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main
        submodules: recursive
        
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git bc python3 curl
        curl -fsS https://dlang.org/install.sh | bash -s dmd
        source ~/dlang/dmd-*/activate
        echo "$(echo ~/dlang/dmd-*/linux/bin64)" >> $GITHUB_PATH
        echo "HOST_DMD=$(echo ~/dlang/dmd-*/linux/bin64/dmd)" >> $GITHUB_ENV
        
    - name: Create Test Scripts
      run: |
        mkdir -p scripts/perf
        
        # Copy the performance test script
        cat > scripts/perf/dmd-performance-test.sh << 'SCRIPT_EOF'
        #!/bin/bash
        set -e
        
        TEST_TYPE="${1:-baseline}"
        PROJECT_ROOT="$(pwd)"
        RESULTS_DIR="$PROJECT_ROOT/perf-results"
        mkdir -p "$RESULTS_DIR"
        
        # Simple baseline performance test
        echo "Running scheduled baseline performance test..."
        
        # Build DMD
        make clean || true
        if make -j$(nproc) HOST_DMD="$HOST_DMD"; then
            echo "Build successful"
        else
            echo "Build failed"
            exit 1
        fi
        
        # Basic performance metrics
        echo '{"type": "scheduled_baseline", "timestamp": "'$(date -Iseconds)'"}' > "$RESULTS_DIR/results.json"
        
        SCRIPT_EOF
        chmod +x scripts/perf/dmd-performance-test.sh
        
    - name: Run Baseline Test
      run: |
        echo "Running scheduled baseline performance test..."
        make clean || true
        timeout 30m make -j$(nproc) HOST_DMD="$HOST_DMD" || exit 1
        echo "✅ Scheduled baseline test completed"
        
    - name: Archive Baseline Results
      uses: actions/upload-artifact@v4
      with:
        name: scheduled-baseline-${{ github.sha }}
        path: perf-results/
        retention-days: 90

# Additional workflow for performance monitoring
on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

# Environment variables for all jobs
env:
  PERFORMANCE_TIMEOUT: 90
  BUILD_TIMEOUT: 30
