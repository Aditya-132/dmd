    - name: Comment PR with Performance Results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          
          let report;
          try {
            report = fs.readFileSync('/tmp/performance-report.md', 'utf8');
          } catch (error) {
            console.error('Error reading performance report:', error);
            report = `# ⚠️ Performance Test Error
            
            Performance comparison could not be completed due to an internal error.
            
            **Error:** ${error.message}
            
            Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            
            ---
            *DMD Performance Regression Testing*`;
          }
          
          try {
            // Find existing performance comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComments = comments.filter(comment => 
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('DMD Performance')
            );
            
            if (botComments.length > 0) {
              // Update the most recent performance comment
              const latestComment = botComments[botComments.length - 1];
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: latestComment.id,
                body: report
              });
              console.log('✅ Updated existing performance comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
              console.log('✅ Created new performance comment');
            }
          } catch (error) {
            console.error('Failed to comment on PR:', error);
            core.setFailed(`Failed to comment on PR: ${error.message}`);
          }
          
