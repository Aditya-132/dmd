            echo '{"error": "baseline_build_failed", "timestamp": "'$(date -Iseconds)'"}' > /tmp/perf-results/baseline.json
            exit 1
        fi
        
        # Verify DMD was built successfully
        DMD_PATHS=("generated/linux/release/64/dmd" "generated/linux/debug/64/dmd" "generated/linux/64/dmd")
        DMD_FOUND=false
        
        for path in "${DMD_PATHS[@]}"; do
            if [ -f "$path" ] && [ -x "$path" ]; then
                echo "✅ Found DMD at: $path"
                # Test basic functionality
                if "$path" --version > /dev/null 2>&1; then
                    echo "✅ Baseline DMD is functional"
                    DMD_FOUND=true
                    break
                fi
            fi
        done
        
        if [ "$DMD_FOUND" = false ]; then
