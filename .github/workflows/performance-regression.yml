name: DMD Performance Regression Testing

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline reference (branch/commit)'
        required: false
        default: 'main'
      pr_ref:
        description: 'PR reference (branch/commit)'
        required: false
        default: ''

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  # Performance test configuration
  PERFORMANCE_TIMEOUT: 90
  BUILD_TIMEOUT: 30
  
jobs:
  performance-test:
    name: DMD Performance Regression Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Setup Build Environment
      run: |
        echo "=== Setting up DMD build environment ==="
        sudo apt-get update
        sudo apt-get install -y build-essential git bc python3 time curl gdc
        
        # Install bootstrap D compiler
        echo "Installing bootstrap DMD..."
        curl -fsS https://dlang.org/install.sh | bash -s dmd
        source ~/dlang/dmd-*/activate
        
        # Export paths for subsequent steps
        echo "$(echo ~/dlang/dmd-*/linux/bin64)" >> $GITHUB_PATH
        echo "HOST_DMD=$(echo ~/dlang/dmd-*/linux/bin64/dmd)" >> $GITHUB_ENV
        
        # Set library paths for Phobos/druntime
        echo "LIBRARY_PATH=$(echo ~/dlang/dmd-*/linux/lib64):$LIBRARY_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$(echo ~/dlang/dmd-*/linux/lib64):$LD_LIBRARY_PATH" >> $GITHUB_ENV
        
        # Verify bootstrap environment
        dmd --version
        echo "Testing basic D compilation..."
        echo 'import std.stdio; void main() { writeln("Hello, World!"); }' > test.d
        dmd test.d -of=test && ./test && rm -f test test.d
        echo "✅ Bootstrap D environment verified"

    - name: Create Performance Test Scripts
      run: |
        mkdir -p scripts/perf
        
        # Create the main performance test script
        cat > scripts/perf/dmd-performance-test.sh << 'SCRIPT_EOF'
        #!/bin/bash
        # DMD Performance Test Script with comprehensive error handling
        # Usage: ./dmd-performance-test.sh [baseline|pr]

        set -e

        TEST_TYPE="${1:-pr}"
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        PROJECT_ROOT="$(cd "$SCRIPT_DIR/../.." && pwd)"
        RESULTS_DIR="$PROJECT_ROOT/perf-results"

        mkdir -p "$RESULTS_DIR"

        # Format duration helper
        format_duration() {
            local duration="$1"
            printf "%.9f" "$duration" | sed 's/^\./0./'
        }

        # Find DMD binary with comprehensive search
        find_dmd() {
            local dmd_paths=(
                "generated/linux/release/64/dmd"
                "generated/linux/debug/64/dmd"
                "generated/osx/release/64/dmd"
                "generated/linux/64/dmd"
                "src/dmd"
                "dmd"
                "compiler/src/dmd"
            )
            
            for path in "${dmd_paths[@]}"; do
                if [ -f "$PROJECT_ROOT/$path" ] && [ -x "$PROJECT_ROOT/$path" ]; then
                    echo "$PROJECT_ROOT/$path"
                    return 0
                fi
            done
            
            echo ""
            return 1
        }

        # Test compilation with detailed error reporting
        test_compilation() {
            local test_name="$1"
            local source_files="$2"
            local output_file="$3"
            local timeout_sec="${4:-120}"
            
            echo "Testing $test_name..."
            
            local start_time=$(date +%s.%N)
            local compile_result=0
            local error_output=""
            
            # Test compilation with timeout and error capture
            if ! error_output=$(timeout "$timeout_sec" "$DMD_BINARY" $source_files -of="$output_file" -v 2>&1); then
                compile_result=1
                echo "❌ $test_name compilation failed"
                echo "Error details (last 10 lines):"
                echo "$error_output" | tail -10
            else
                echo "✅ $test_name compiled successfully"
                # Cleanup generated file
                rm -f "$output_file"
            fi
            
            local end_time=$(date +%s.%N)
            
            if [ $compile_result -eq 0 ]; then
                format_duration "$(echo "$end_time - $start_time" | bc -l)"
            else
                echo "999.000000000"
            fi
        }

        echo "=== DMD Performance Test ($TEST_TYPE) ==="
        cd "$PROJECT_ROOT"

        # Initialize results JSON
        {
            echo "{"
            echo "  \"timestamp\": \"$(date -Iseconds)\","
            echo "  \"test_type\": \"$TEST_TYPE\","
            if git rev-parse --git-dir > /dev/null 2>&1; then
                echo "  \"commit\": \"$(git rev-parse HEAD)\","
                echo "  \"branch\": \"$(git branch --show-current 2>/dev/null || git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'unknown')\","
            fi
        } > "$RESULTS_DIR/results.json"

        # Find and verify DMD binary
        DMD_BINARY=$(find_dmd)
        if [ -z "$DMD_BINARY" ]; then
            echo "❌ DMD binary not found!"
            echo "Searching for DMD files:"
            find . -name "*dmd*" -type f | head -20
            echo '  "error": "dmd_not_found",' >> "$RESULTS_DIR/results.json"
            echo '}' >> "$RESULTS_DIR/results.json"
            exit 1
        fi

        echo "📍 Using DMD: $DMD_BINARY"

        # Verify DMD functionality
        echo "🔍 Verifying DMD functionality..."
        echo 'void main() {}' > /tmp/test_basic.d
        if ! "$DMD_BINARY" /tmp/test_basic.d -of=/tmp/test_basic 2>/dev/null; then
            echo "❌ DMD binary is not functional"
            echo '  "error": "dmd_not_functional",' >> "$RESULTS_DIR/results.json"
            echo '}' >> "$RESULTS_DIR/results.json"
            rm -f /tmp/test_basic.d /tmp/test_basic
            exit 1
        fi
        rm -f /tmp/test_basic.d /tmp/test_basic
        echo "✅ DMD is functional"

        # Check standard library availability
        echo "🔍 Checking standard library..."
        echo 'import std.stdio; void main() { writeln("test"); }' > /tmp/test_phobos.d
        if "$DMD_BINARY" /tmp/test_phobos.d -of=/tmp/test_phobos 2>/dev/null; then
            HAS_PHOBOS=true
            echo "✅ Standard library (Phobos) is available"
            rm -f /tmp/test_phobos /tmp/test_phobos.d
        else
            HAS_PHOBOS=false
            echo "⚠️ Standard library not available - using simpler tests"
            rm -f /tmp/test_phobos.d
        fi

        # Test 1: Basic compilation benchmark
        echo "🧪 Running basic compilation benchmark..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"
        
        start_time=$(date +%s.%N)
        success_count=0
        for i in {1..10}; do
            echo "void test$i() { int x = $i; } void main() { test$i(); }" > "test$i.d"
            if "$DMD_BINARY" "test$i.d" -of="test$i" 2>/dev/null; then
                success_count=$((success_count + 1))
                rm -f "test$i"
            fi
            rm -f "test$i.d"
        done
        end_time=$(date +%s.%N)
        
        if [ $success_count -eq 10 ]; then
            basic_benchmark_time=$(format_duration "$(echo "$end_time - $start_time" | bc -l)")
        else
            basic_benchmark_time="999.000000000"
        fi
        
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"basic_benchmark_time\": $basic_benchmark_time," >> "$RESULTS_DIR/results.json"

        # Test 2: Real D project compilation
        echo "🏗️ Testing real D project compilation..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"

        cat > main.d << 'EOF'
module main;

struct Token {
    string type;
    string value;
    size_t line;
    
    this(string t, string v, size_t l) {
        type = t;
        value = v;
        line = l;
    }
}

class Lexer {
    Token[] tokens;
    
    Token[] tokenize(string input) {
        Token[] result;
        size_t line = 1;
        
        foreach (i, char c; input) {
            if (c >= 'a' && c <= 'z') {
                result ~= Token("LETTER", input[i..i+1], line);
            } else if (c >= '0' && c <= '9') {
                result ~= Token("DIGIT", input[i..i+1], line);
            } else if (c == '\n') {
                line++;
            }
        }
        return result;
    }
}

abstract class ASTNode {
    abstract string toString() const;
}

class Expression : ASTNode {
    string value;
    this(string v) { value = v; }
    override string toString() const { return value; }
}

class Statement : ASTNode {
    ASTNode[] children;
    override string toString() const { return "Statement"; }
    
    void addChild(ASTNode child) {
        children ~= child;
    }
}

class Parser {
    ASTNode parse(Token[] tokens) {
        auto root = new Statement();
        foreach (token; tokens) {
            root.addChild(new Expression(token.value));
        }
        return root;
    }
}

class CodeGenerator {
    string generate(ASTNode ast) {
        return "// Generated code\nvoid generatedFunction() {}\n";
    }
}

void main() {
    auto lexer = new Lexer();
    auto parser = new Parser();
    auto codegen = new CodeGenerator();
    
    string testInput = "hello world 123 test input data processing";
    auto tokens = lexer.tokenize(testInput);
    auto ast = parser.parse(tokens);
    auto code = codegen.generate(ast);
}
EOF

        real_project_time=$(test_compilation "Real D Project" "main.d" "test_app")
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"real_project_compile_time\": $real_project_time," >> "$RESULTS_DIR/results.json"

        # Test 3: Template compilation
        echo "🔧 Testing template compilation..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"

        cat > template_test.d << 'EOF'
module template_test;

// Factorial template
template Factorial(int n) {
    static if (n <= 1)
        enum Factorial = 1;
    else
        enum Factorial = n * Factorial!(n-1);
}

// Prime checking template
template IsPrime(int n) {
    static if (n < 2)
        enum IsPrime = false;
    else static if (n == 2)
        enum IsPrime = true;
    else static if (n % 2 == 0)
        enum IsPrime = false;
    else {
        static if (n % 3 == 0)
            enum IsPrime = false;
        else static if (n % 5 == 0)
            enum IsPrime = false;
        else static if (n % 7 == 0)
            enum IsPrime = false;
        else
            enum IsPrime = true; // Simplified for testing
    }
}

// Generic max template
T max(T)(T a, T b) {
    return a > b ? a : b;
}

// Array processing template
template ArraySum(T) {
    T ArraySum(T[] arr) {
        T sum = T.init;
        foreach (elem; arr) {
            sum += elem;
        }
        return sum;
    }
}

// Template instantiations
enum fact5 = Factorial!(5);
enum fact7 = Factorial!(7);
enum fact10 = Factorial!(10);

enum prime7 = IsPrime!(7);
enum prime11 = IsPrime!(11);
enum prime13 = IsPrime!(13);
enum prime17 = IsPrime!(17);

void main() {
    int factSum = fact5 + fact7 + fact10;
    bool anyPrime = prime7 || prime11 || prime13 || prime17;
    
    auto maxInt = max(10, 20);
    auto maxFloat = max(1.5, 2.5);
    
    int[] testArray = [1, 2, 3, 4, 5];
    auto sum = ArraySum!int(testArray);
}
EOF

        template_stress_time=$(test_compilation "Template Test" "template_test.d" "template_test")
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"template_stress_time\": $template_stress_time," >> "$RESULTS_DIR/results.json"

        # Test 4: CTFE compilation
        echo "⚡ Testing CTFE compilation..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"

        cat > ctfe_test.d << 'EOF'
module ctfe_test;

// CTFE functions
int[] generateSquares(int n) {
    int[] result;
    foreach (i; 0 .. n) {
        result ~= i * i;
    }
    return result;
}

int fibonacci(int n) {
    if (n <= 1) return n;
    return fibonacci(n-1) + fibonacci(n-2);
}

string generateString(int n) {
    string result = "Generated: ";
    foreach (i; 0 .. n) {
        if (i > 0) result ~= ", ";
        result ~= cast(char)('A' + (i % 26));
    }
    return result;
}

// Matrix multiplication at compile time
int[][] multiplyMatrices(int[][] a, int[][] b) {
    if (a.length == 0 || b.length == 0 || a[0].length != b.length) {
        return [];
    }
    
    int[][] result = new int[][](a.length, b[0].length);
    foreach (i; 0 .. a.length) {
        foreach (j; 0 .. b[0].length) {
            result[i][j] = 0;
            foreach (k; 0 .. a[0].length) {
                result[i][j] += a[i][k] * b[k][j];
            }
        }
    }
    return result;
}

// Force CTFE execution
enum squares = generateSquares(25);
enum fib10 = fibonacci(10);
enum fib12 = fibonacci(12);
enum generated = generateString(20);

// Simple matrix operations
enum matrix1 = [[1, 2], [3, 4]];
enum matrix2 = [[5, 6], [7, 8]];
enum matrixResult = multiplyMatrices(matrix1, matrix2);

void main() {
    int total = 0;
    foreach (val; squares) {
        total += val;
    }
    
    int fibResult = fib10 + fib12;
    string msg = generated;
    
    // Use matrix result
    foreach (row; matrixResult) {
        foreach (val; row) {
            total += val;
        }
    }
}
EOF

        ctfe_stress_time=$(test_compilation "CTFE Test" "ctfe_test.d" "ctfe_test")
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"ctfe_stress_time\": $ctfe_stress_time," >> "$RESULTS_DIR/results.json"

        # Test 5: Large file compilation
        echo "📄 Testing large file compilation..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"

        # Generate large D file
        {
            echo "module large_file;"
            echo ""
            
            # Generate classes with methods
            for i in $(seq 1 40); do
                cat << CLASSEOF
class TestClass$i {
    private int value$i = $i;
    private string name$i = "test$i";
    
    this() {}
    this(int val) { value$i = val; }
    this(int val, string n) { value$i = val; name$i = n; }
    
    int getValue() { return value$i; }
    void setValue(int val) { value$i = val; }
    string getName() { return name$i; }
    void setName(string n) { name$i = n; }
    
    int compute() {
        int result = 0;
        foreach (j; 0 .. 10) {
            result += j * value$i;
        }
        return result;
    }
    
    bool isValid() {
        return value$i > 0 && name$i.length > 0;
    }
    
    void process() {
        if (isValid()) {
            int temp = compute();
            setValue(temp % 1000);
        }
    }
}

interface IProcessor$i {
    int process$i(int input);
}

class Processor$i : IProcessor$i {
    TestClass$i instance;
    
    this() {
        instance = new TestClass$i();
    }
    
    int process$i(int input) {
        instance.setValue(input);
        return instance.compute();
    }
}

int processClass$i() {
    auto obj = new TestClass$i();
    auto processor = new Processor$i();
    obj.process();
    return processor.process$i(obj.getValue());
}

CLASSEOF
            done
            
            echo "void main() {"
            echo "    int total = 0;"
            for i in $(seq 1 40); do
                echo "    total += processClass$i();"
            done
            echo "    // Final computation"
            echo "    total = total % 10000;"
            echo "}"
        } > large_file.d

        large_file_time=$(test_compilation "Large File" "large_file.d" "large_test" 240)
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"large_file_compile_time\": $large_file_time," >> "$RESULTS_DIR/results.json"

        # Test 6: Multi-module project
        echo "📚 Testing multi-module compilation..."
        temp_dir=$(mktemp -d)
        cd "$temp_dir"

        # Module 1: Utilities
        cat > utils.d << 'EOF'
module utils;

struct Point {
    int x, y;
    
    this(int x, int y) {
        this.x = x;
        this.y = y;
    }
    
    int distanceSquared() {
        return x*x + y*y;
    }
    
    Point add(Point other) {
        return Point(x + other.x, y + other.y);
    }
}

class Calculator {
    int add(int a, int b) { return a + b; }
    int subtract(int a, int b) { return a - b; }
    int multiply(int a, int b) { return a * b; }
    int divide(int a, int b) { return b != 0 ? a / b : 0; }
    
    int power(int base, int exp) {
        int result = 1;
        foreach (i; 0 .. exp) {
            result = multiply(result, base);
        }
        return result;
    }
}

interface Drawable {
    string draw();
}
EOF

        # Module 2: Algorithms
        cat > algorithms.d << 'EOF'
module algorithms;
import utils;

class AdvancedCalculator : Calculator {
    Point[] points;
    
    void addPoint(int x, int y) {
        points ~= Point(x, y);
    }
    
    void addPoint(Point p) {
        points ~= p;
    }
    
    int sumDistances() {
        int total = 0;
        foreach (point; points) {
            total = add(total, point.distanceSquared());
        }
        return total;
    }
    
    Point centroid() {
        if (points.length == 0) return Point(0, 0);
        
        int sumX = 0, sumY = 0;
        foreach (point; points) {
            sumX += point.x;
            sumY += point.y;
        }
        return Point(sumX / cast(int)points.length, sumY / cast(int)points.length);
    }
}

int factorial(int n) {
    if (n <= 1) return 1;
    Calculator calc = new Calculator();
    return calc.multiply(n, factorial(n-1));
}

class Shape : Drawable {
    Point center;
    
    this(Point c) { center = c; }
    
    override string draw() {
        return "Shape at center";
    }
}

class Circle : Shape {
    int radius;
    
    this(Point c, int r) {
        super(c);
        radius = r;
    }
    
    override string draw() {
        return "Circle";
    }
    
    int area() {
        // Approximate PI as 3
        return 3 * radius * radius;
    }
}
EOF

        # Module 3: Main application
        cat > main.d << 'EOF'
module main;
import utils;
import algorithms;

class Application {
    AdvancedCalculator calc;
    Shape[] shapes;
    
    this() {
        calc = new AdvancedCalculator();
    }
    
    void run() {
        // Add test points
        foreach (i; 0 .. 15) {
            calc.addPoint(i, i*2);
        }
        
        // Calculate distances
        int distances = calc.sumDistances();
        Point center = calc.centroid();
        
        // Create shapes
        foreach (i; 1 .. 10) {
            shapes ~= new Circle(Point(i, i), i);
        }
        
        // Process shapes
        foreach (shape; shapes) {
            string drawing = shape.draw();
        }
        
        // Mathematical operations
        int fact5 = factorial(5);
        int pow23 = calc.power(2, 8);
    }
}

void main() {
    auto app = new Application();
    app.run();
}
EOF

        multi_module_time=$(test_compilation "Multi-Module" "main.d utils.d algorithms.d" "multi_test")
        cd "$PROJECT_ROOT"
        rm -rf "$temp_dir"
        echo "  \"multi_module_compile_time\": $multi_module_time," >> "$RESULTS_DIR/results.json"

        # Test 7: DMD Self-compilation (if possible)
        if [ -f "src/dmd/mars.d" ] || [ -f "compiler/src/dmd/mars.d" ] || [ -d "src" ]; then
            echo "🔄 Testing DMD self-compilation..."
            
            start_time=$(date +%s.%N)
            self_compile_success=false
            
            echo "Attempting DMD self-compilation..."
            
            # Clean before attempting self-compile
            make clean > /dev/null 2>&1 || true
            
            # Try different build approaches with timeout
            if timeout 900 make -j1 HOST_DMD="$HOST_DMD" > /dev/null 2>&1; then
                self_compile_success=true
                echo "✅ Self-compilation via default Makefile succeeded"
            elif timeout 900 make -f posix.mak -j1 HOST_DMD="$HOST_DMD" > /dev/null 2>&1; then
                self_compile_success=true
                echo "✅ Self-compilation via posix.mak succeeded"
            else
                echo "❌ Self-compilation failed or timed out"
            fi
            
            end_time=$(date +%s.%N)
            
            if [ "$self_compile_success" = true ]; then
                self_compile_time=$(format_duration "$(echo "$end_time - $start_time" | bc -l)")
            else
                self_compile_time="999.000000000"
            fi
            
            echo "  \"self_compile_time\": $self_compile_time," >> "$RESULTS_DIR/results.json"
        fi

        # Get binary information
        if [ -f "$DMD_BINARY" ]; then
            dmd_size=$(stat -c%s "$DMD_BINARY" 2>/dev/null || stat -f%z "$DMD_BINARY" 2>/dev/null || echo "0")
            dmd_version=$("$DMD_BINARY" --version 2>/dev/null | head -1 || echo "unknown")
            echo "  \"dmd_version\": \"$dmd_version\"," >> "$RESULTS_DIR/results.json"
            echo "  \"dmd_size_bytes\": $dmd_size," >> "$RESULTS_DIR/results.json"
        else
            echo "  \"dmd_size_bytes\": 0," >> "$RESULTS_DIR/results.json"
        fi

        # Add system information
        echo "  \"system_info\": {" >> "$RESULTS_DIR/results.json"
        echo "    \"os\": \"$(uname -s)\"," >> "$RESULTS_DIR/results.json"
        echo "    \"arch\": \"$(uname -m)\"," >> "$RESULTS_DIR/results.json"
        echo "    \"cores\": $(nproc 2>/dev/null || echo "1")," >> "$RESULTS_DIR/results.json"
        echo "    \"has_phobos\": $HAS_PHOBOS" >> "$RESULTS_DIR/results.json"
        echo "  }" >> "$RESULTS_DIR/results.json"

        # Close JSON properly
        echo "}" >> "$RESULTS_DIR/results.json"

        # Validate and format JSON
        if command -v python3 >/dev/null 2>&1; then
            python3 -c "
import json
import re

try:
    with open('$RESULTS_DIR/results.json', 'r') as f:
        content = f.read()
    
    # Clean up JSON format
    content = re.sub(r',(\s*[}\]])', r'\1', content)
    
    # Validate JSON
    data = json.loads(content)
    
    # Write formatted JSON
    with open('$RESULTS_DIR/results.json', 'w') as f:
        json.dump(data, f, indent=2)
    
    print('✅ JSON formatted and validated successfully')
except Exception as e:
    print(f'❌ JSON formatting failed: {e}')
    # Fallback formatting
    with open('$RESULTS_DIR/results.json', 'r') as f:
        content = f.read()
    content = re.sub(r',(\s*[}\]])', r'\1', content.strip())
    with open('$RESULTS_DIR/results.json', 'w') as f:
        f.write(content)
"
        fi

        echo "✅ Performance test completed!"
        echo "📊 Results saved to: $RESULTS_DIR/results.json"

        # Display summary
        echo ""
        echo "=== Performance Test Summary ==="
        if command -v python3 >/dev/null 2>&1; then
            python3 -c "
import json
import os

results_file = '$RESULTS_DIR/results.json'
try:
    with open(results_file) as f:
        data = json.load(f)
except Exception as e:
    print(f'Error reading results: {e}')
    exit()

def fmt_time(t):
    if t is None:
        return 'N/A'
    return 'FAILED' if str(t) == '999.000000000' else f'{float(t):.3f}s'

def fmt_size(s):
    if s is None or s == 0:
        return 'N/A'
    return f'{int(s) / (1024*1024):.1f}MB'

print(f\"Basic Benchmark: {fmt_time(data.get('basic_benchmark_time'))}\")
print(f\"Real Project: {fmt_time(data.get('real_project_compile_time'))}\")
print(f\"Template Test: {fmt_time(data.get('template_stress_time'))}\")
print(f\"CTFE Test: {fmt_time(data.get('ctfe_stress_time'))}\")
