            build_success=true
            echo "✅ Baseline build succeeded with explicit Makefile"
        fi
        
        if [ "$build_success" = false ]; then
            echo "❌ All baseline build attempts failed"
            echo "=== Build log (last 30 lines) ==="
            make -j$(nproc) HOST_DMD="$HOST_DMD" 2>&1 | tail -30 || true
            
            # Create error result
