#!/usr/bin/env python3
import json
import sys
import os
from datetime import datetime

def load_json(file_path):
    """Load JSON file with error handling"""
    try:
        if not os.path.exists(file_path):
            return {"error": f"File {file_path} not found"}
        with open(file_path) as f:
            return json.load(f)
    except Exception as e:
        return {"error": f"Failed to load {file_path}: {e}"}

def format_time(seconds):
    """Format time with failure detection"""
    if seconds is None:
        return "N/A"
    if str(seconds) == "999.000000000":
        return "FAILED"
    try:
        return f"{float(seconds):.3f}s"
    except:
        return "ERROR"

def format_size(bytes_val):
    """Format file size in MB"""
    if bytes_val is None or bytes_val == 0:
        return "N/A"
    try:
        mb = int(bytes_val) / (1024 * 1024)
        return f"{mb:.1f}MB"
    except:
        return "ERROR"

def calculate_change(baseline_val, pr_val):
    """Calculate percentage change between baseline and PR"""
    if baseline_val is None or pr_val is None:
        return "N/A"
    
    baseline_str = str(baseline_val)
    pr_str = str(pr_val)
    
    if baseline_str == "999.000000000" and pr_str == "999.000000000":
        return "Both failed"
    elif baseline_str == "999.000000000":
        return "Baseline failed"
    elif pr_str == "999.000000000":
        return "PR failed"
    
    try:
        baseline_num = float(baseline_val)
        pr_num = float(pr_val)
        if baseline_num == 0:
            return "N/A"
        
        change_pct = ((pr_num - baseline_num) / baseline_num) * 100
        if abs(change_pct) < 1:
            return "≈ no change"
        elif change_pct < 0:
            return f"🚀 {abs(change_pct):.1f}% faster"
        else:
            return f"🔻 {change_pct:.1f}% slower"
    except:
        return "ERROR"

def main():
    if len(sys.argv) != 3:
        print("Usage: python3 generate-report.py <baseline.json> <pr.json>")
        sys.exit(1)
    
    baseline_file = sys.argv[1]
    pr_file = sys.argv[2]
    
    baseline = load_json(baseline_file)
    pr = load_json(pr_file)

    # Check for critical errors
    if baseline.get('error') and pr.get('error'):
        print("# ⚠️ DMD Performance Test Failed")
        print()
        print("❌ **Both baseline and PR tests failed**")
        print()
        print("**Baseline Error:** " + baseline.get('error', 'Unknown'))
        print("**PR Error:** " + pr.get('error', 'Unknown'))
        print()
        print("Please check the workflow logs for build errors.")
        return

    elif baseline.get('error'):
        print("# ⚠️ DMD Performance Test Issue")
        print()
        print("❌ **Baseline test failed** - cannot compare performance")
        print()
        print("**Error:** " + baseline.get('error', 'Unknown'))
        print()
        print("PR test succeeded, but baseline comparison is not available.")
        return

    elif pr.get('error'):
        print("# ❌ DMD Performance Test Failed")
        print()
        print("**PR test failed** - this needs to be fixed before merging")
        print()
        print("**Error:** " + pr.get('error', 'Unknown'))
        print()
        print("Baseline test succeeded, but PR has issues.")
        return

    # Generate successful comparison report
    print("# 📊 DMD Performance Comparison")
    print()
    
    baseline_branch = baseline.get('branch', 'main')
    pr_branch = pr.get('branch', 'PR')
    baseline_commit = baseline.get('commit', '')[:8] if baseline.get('commit') else 'unknown'
    pr_commit = pr.get('commit', '')[:8] if pr.get('commit') else 'unknown'
    
    print(f"**Comparing:** `{pr_branch}` ({pr_commit}) vs `{baseline_branch}` ({baseline_commit})")
    print(f"**Tested on:** {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}")
    print()

    # System information
    pr_sys = pr.get('system_info', {})
    print(f"**Environment:** {pr_sys.get('os', 'Unknown')} {pr_sys.get('arch', 'Unknown')} ({pr_sys.get('cores', 'Unknown')} cores)")
    print(f"**Standard Library:** {'Available' if pr_sys.get('has_phobos') else 'Not Available'}")
    print()

    # Performance comparison table
    print("## ⚡ Compilation Performance")
    print("| Test Case | Baseline | PR Branch | Performance Change |")
    print("|-----------|----------|-----------|-------------------|")

    test_cases = [
        ("Basic Benchmark", "basic_benchmark_time"),
        ("Real D Project", "real_project_compile_time"), 
        ("Template Heavy", "template_stress_time"),
        ("CTFE Heavy", "ctfe_stress_time"),
        ("Large File", "large_file_compile_time"),
        ("Multi-Module", "multi_module_compile_time"),
    ]

    # Add self-compile if available in both
    if "self_compile_time" in baseline and "self_compile_time" in pr:
        test_cases.append(("DMD Self-Compile", "self_compile_time"))

    for test_name, key in test_cases:
        if key in pr:  # Only show tests that ran in PR
            base_val = baseline.get(key)
            pr_val = pr[key]
            change = calculate_change(base_val, pr_val)
            print(f"| {test_name} | {format_time(base_val)} | {format_time(pr_val)} | {change} |")

    print()

    # Binary size comparison
    print("## 📦 Binary Size")
    print("| Component | Baseline | PR Branch | Size Change |")
    print("|-----------|----------|-----------|-------------|")

    if "dmd_size_bytes" in baseline and "dmd_size_bytes" in pr:
        base_size = baseline["dmd_size_bytes"]
        pr_size = pr["dmd_size_bytes"]
        size_change = calculate_change(base_size, pr_size).replace("faster", "smaller").replace("slower", "larger")
        print(f"| DMD Compiler | {format_size(base_size)} | {format_size(pr_size)} | {size_change} |")

    print()

    # Analysis and warnings
    significant_regressions = []
    test_failures = []
    improvements = []

    for test_name, key in test_cases:
        if key in pr:
            pr_val = pr[key]
            baseline_val = baseline.get(key)
            
            # Check for new test failures
            if str(pr_val) == "999.000000000":
                if baseline_val and str(baseline_val) != "999.000000000":
                    test_failures.append(test_name)
            
            # Check for significant changes
            elif baseline_val and str(baseline_val) != "999.000000000":
                try:
                    base_val = float(baseline_val)
                    pr_val_float = float(pr_val)
                    if base_val > 0:
                        change_pct = ((pr_val_float - base_val) / base_val) * 100
                        
                        if change_pct > 15:  # >15% slower
                            significant_regressions.append(f"{test_name}: {change_pct:.1f}% slower")
                        elif change_pct < -10:  # >10% faster
                            improvements.append(f"{test_name}: {abs(change_pct):.1f}% faster")
                except:
                    pass

    # Report issues and improvements
    if test_failures:
        print("## ❌ Test Failures")
        print("The following tests failed in the PR but worked in baseline:")
        for test in test_failures:
            print(f"- **{test}** - This indicates a potential regression")
        print()

    if significant_regressions:
        print("## ⚠️ Performance Regressions")
        print("Significant performance regressions detected:")
        for regression in significant_regressions:
            print(f"- **{regression}**")
        print()
        print("Consider investigating these regressions before merging.")
        print()

    if improvements:
        print("## 🚀 Performance Improvements")
        print("Notable performance improvements:")
        for improvement in improvements:
            print(f"- **{improvement}**")
        print()

    # Overall summary
    successful_tests = len([test for test, key in test_cases if key in pr and str(pr[key]) != "999.000000000"])
    total_tests = len([test for test, key in test_cases if key in pr])
    
    print("## 📈 Summary")
    print(f"- **Tests Completed:** {successful_tests}/{total_tests}")
    
    if not test_failures and not significant_regressions:
        print("- **Status:** ✅ No significant performance issues detected")
    elif test_failures:
        print("- **Status:** ❌ Critical test failures require attention")
    elif significant_regressions:
        print("- **Status:** ⚠️ Performance regressions detected")
    else:
        print("- **Status:** ✅ Performance looks good")

    print()
    print("---")
    print("*Generated by DMD Performance Regression Testing*")
    print(f"*Report generated at {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')}*")

if __name__ == "__main__":
    main()
        REPORT_EOF
        
