    - name: Build and Test Baseline (Main Branch)
      run: |
        echo "=== Building Baseline DMD ==="
        
        # Determine baseline reference
        BASELINE_REF="${{ github.event.inputs.baseline_ref || github.base_ref || 'main' }}"
